# Render Blueprint — deploys Scribe as a single Docker web service.
# Render reads this file automatically: New + → Blueprint → pick this repo → Apply.
# The container honors Render's injected $PORT; SECRET_KEY is generated by Render.
services:
  - type: web
    name: scribe-docs-editor
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
